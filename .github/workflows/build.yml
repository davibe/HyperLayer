name: Build HyperLayer

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  pull_request:
  workflow_dispatch:
  release:
    types:
      - published

permissions:
  contents: write

jobs:
  package:
    name: Package macOS app
    runs-on: macos-latest

    steps:
      - name: Check out source
        uses: actions/checkout@v6

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Import signing certificate
        env:
          CODESIGN_CERTIFICATE_BASE64: ${{ secrets.HYPERLAYER_CODESIGN_CERTIFICATE_BASE64 }}
          CODESIGN_CERTIFICATE_PASSWORD: ${{ secrets.HYPERLAYER_CODESIGN_CERTIFICATE_PASSWORD }}
        run: |
          if [[ -z "$CODESIGN_CERTIFICATE_BASE64" || -z "$CODESIGN_CERTIFICATE_PASSWORD" ]]; then
            echo "No signing certificate configured; using ad-hoc signing."
            echo "HYPERLAYER_CODE_SIGN_IDENTITY=-" >> "$GITHUB_ENV"
            exit 0
          fi

          scripts/import_codesign_certificate.sh
          echo "HYPERLAYER_CODE_SIGN_IDENTITY=HyperLayer Self-Signed Code Signing" >> "$GITHUB_ENV"

      - name: Select package name
        id: package
        shell: bash
        run: |
          release_tag="${{ github.event.release.tag_name }}"

          if [[ -n "$release_tag" ]]; then
            basename="HyperLayer-$release_tag"
          elif [[ "$GITHUB_REF" == refs/tags/* ]]; then
            basename="HyperLayer-$GITHUB_REF_NAME"
          elif [[ "$GITHUB_REF_NAME" == "main" ]]; then
            basename="HyperLayer-main"
          else
            safe_ref="$(printf '%s' "$GITHUB_REF_NAME" | tr '/ ' '--')"
            basename="HyperLayer-$safe_ref"
          fi

          echo "zip_basename=$basename" >> "$GITHUB_OUTPUT"

      - name: Build and package
        env:
          CONFIGURATION: Release
          DERIVED_DATA_PATH: build
          DIST_DIR: dist
          ZIP_BASENAME: ${{ steps.package.outputs.zip_basename }}
          CODE_SIGN_IDENTITY: ${{ env.HYPERLAYER_CODE_SIGN_IDENTITY }}
        run: scripts/package_app.sh

      - name: Upload build artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ steps.package.outputs.zip_basename }}
          path: |
            dist/*.zip
            dist/*.sha256
          if-no-files-found: error
          retention-days: 30

      - name: Upload release assets
        if: github.event_name == 'release' || startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ github.event.release.tag_name || github.ref_name }}
          files: |
            dist/*.zip
            dist/*.sha256
          fail_on_unmatched_files: true
          overwrite_files: true
